services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --performance_schema=OFF
      - --innodb-buffer-pool-size=128M
      - --innodb-log-buffer-size=16M
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    volumes:
      - den-mysql-data:/var/lib/mysql

  den-api:
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: packaging/docker/Dockerfile.den
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "127.0.0.1:${DEN_API_PORT:-8788}:8788"
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      PORT: "8788"
      OPENWORK_DEV_MODE: ${OPENWORK_DEV_MODE:-0}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      DEN_DB_ENCRYPTION_KEY: ${DEN_DB_ENCRYPTION_KEY}
      BETTER_AUTH_URL: ${APP_PUBLIC_URL}
      DEN_MCP_RESOURCE_URL: ${API_PUBLIC_URL}/mcp
      DEN_BETTER_AUTH_TRUSTED_ORIGINS: ${DEN_BETTER_AUTH_TRUSTED_ORIGINS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      PROVISIONER_MODE: ${PROVISIONER_MODE:-stub}
      WORKER_URL_TEMPLATE: ${WORKER_URL_TEMPLATE:-https://workers.local/{workerId}}
      DAYTONA_API_URL: ${DAYTONA_API_URL:-https://app.daytona.io/api}
      DAYTONA_API_KEY: ${DAYTONA_API_KEY}
      DAYTONA_TARGET: ${DAYTONA_TARGET}
      DAYTONA_SNAPSHOT: ${DAYTONA_SNAPSHOT}
      DAYTONA_WORKER_PROXY_BASE_URL: ${DAYTONA_WORKER_PROXY_BASE_URL}
      DAYTONA_SIGNED_PREVIEW_EXPIRES_SECONDS: ${DAYTONA_SIGNED_PREVIEW_EXPIRES_SECONDS:-86400}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      LOOPS_API_KEY: ${LOOPS_API_KEY}
      LOOPS_TRANSACTIONAL_ID_DEN_VERIFY_EMAIL: ${LOOPS_TRANSACTIONAL_ID_DEN_VERIFY_EMAIL}
      LOOPS_TRANSACTIONAL_ID_DEN_ORG_INVITE_EMAIL: ${LOOPS_TRANSACTIONAL_ID_DEN_ORG_INVITE_EMAIL}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8788/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  den-worker-proxy:
    profiles:
      - daytona
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: packaging/docker/Dockerfile.den-worker-proxy
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "127.0.0.1:${DEN_WORKER_PROXY_PORT:-8789}:8789"
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      PORT: "8789"
      DAYTONA_API_URL: ${DAYTONA_API_URL:-https://app.daytona.io/api}
      DAYTONA_API_KEY: ${DAYTONA_API_KEY}
      DAYTONA_TARGET: ${DAYTONA_TARGET}
      DAYTONA_OPENWORK_PORT: ${DAYTONA_OPENWORK_PORT:-8787}
      DAYTONA_SIGNED_PREVIEW_EXPIRES_SECONDS: ${DAYTONA_SIGNED_PREVIEW_EXPIRES_SECONDS:-86400}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8789/unknown').then((res)=>process.exit([404,502].includes(res.status)?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  den-web:
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: packaging/docker/Dockerfile.den-web
    depends_on:
      den-api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${DEN_WEB_PORT:-3005}:3005"
    environment:
      OPENWORK_DEV_MODE: ${OPENWORK_DEV_MODE:-0}
      DEN_API_BASE: http://den-api:8788
      DEN_AUTH_FALLBACK_BASE: http://den-api:8788
      DEN_AUTH_ORIGIN: ${APP_PUBLIC_URL}
      NEXT_PUBLIC_OPENWORK_AUTH_CALLBACK_URL: ${APP_PUBLIC_URL}
      NEXT_PUBLIC_OPENWORK_APP_CONNECT_URL: ${APP_PUBLIC_URL}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3005/api/den/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 180s

volumes:
  den-mysql-data:
