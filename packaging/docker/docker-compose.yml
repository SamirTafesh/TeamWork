services:
  teamwork-host:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Keep this in sync with apps/orchestrator/package.json if you want a pinned release.
        TEAMWORK_ORCHESTRATOR_VERSION: 0.11.22
    ports:
      - "8787:8787"
    environment:
      # Set these explicitly for stable sharing.
      # TEAMWORK_TOKEN: "..."
      # TEAMWORK_HOST_TOKEN: "..."
      # Optional: TEAMWORK_APPROVAL_MODE: "auto"
      # Optional: TEAMWORK_APPROVAL_TIMEOUT_MS: "30000"
      TEAMWORK_DATA_DIR: /data/teamwork-orchestrator
      TEAMWORK_SIDECAR_DIR: /data/sidecars
    volumes:
      # Mount an existing project/workspace here.
      - ./workspace:/workspace
      # Persistent host data (OpenCode caches, server config, tokens).
      - ./data:/data
